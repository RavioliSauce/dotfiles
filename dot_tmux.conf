# --- General Settings ---
set -g default-terminal "screen-256color" # Proper colors
set -g history-limit 10000                # Boost history
set -g mouse on                           # Enable mouse support (scrolling/clicking)
set -s escape-time 0                      # Fix lag in Vim/Neovim
set -g base-index 1                       # Start window numbering at 1
setw -g pane-base-index 1                 # Start pane numbering at 1
set -g renumber-windows on                # Reorder windows when one is closed

# --- Keybindings ---
# Change Prefix from Ctrl-b to Ctrl-a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Better split commands (using | and -)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload config easily
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

bind-key y set-window-option synchronize-panes

# --- Aesthetics ---
# Simple status bar styling
set -g status-style bg=default
set -g status-left-length 40
set -g status-left "#{?client_prefix,#[bg=yellow]#[fg=black],#[fg=green]} Session: #S #[default]"
set -g status-right "#[fg=cyan]%Y-%m-%d %H:%M#[default]"
set -g pane-active-border-style fg=blue

# Use vim keybindings in copy mode
setw -g mode-keys vi

# Update default binding of `Enter` and dragging to also use copy-pipe
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -se c -i"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -se c -i"

# Vim-style pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes (Shift + hjkl)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
