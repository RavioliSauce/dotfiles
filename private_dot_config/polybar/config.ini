[colors]
bg = #e61a1b26
bg-solid = #1a1b26
surface = #e624283b
surface-alt = #e62f3549
fg = #a9b1d6
muted = #565f89
border = #414868
blue = #7aa2f7
cyan = #7dcfff
green = #9ece6a
yellow = #e0af68
red = #f7768e
magenta = #bb9af7

[bar/main]
width = 98.5%
height = 40
offset-x = 0.75%
offset-y = 12
radius = 8
fixed-center = true

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 0
border-size = 1
border-color = ${colors.border}

padding-left = 1
padding-right = 1
module-margin = 0

separator = ""

font-0 = JetBrainsMono Nerd Font:size=12;2
font-1 = JetBrainsMono Nerd Font:size=16;3
font-2 = JetBrainsMono Nerd Font:size=22;4

modules-left = logo xwindow
modules-center = bspwm
modules-right = cpu memory battery bluetooth pulseaudio date systray

cursor-click = pointer
cursor-scroll = ns-resize

wm-restack = bspwm
enable-ipc = true

[module/logo]
type = custom/text
content = "’īå "
content-background = ${colors.bg}
content-foreground = ${colors.fg}
content-font = 2
content-padding = 1
click-left = rofi -show drun

[module/xwindow]
type = internal/xwindow
format = <label>
format-background = ${colors.surface}
format-foreground = ${colors.fg}
format-padding = 0
label = %title:0:32:...%
label-minlen = 32

[module/bspwm]
type = internal/bspwm
pin-workspaces = true
enable-click = true
enable-scroll = true
reverse-scroll = false

format = <label-state>

label-focused = %name%
label-focused-background = ${colors.blue}
label-focused-foreground = ${colors.bg-solid}
label-focused-padding = 3

label-occupied = %name%
label-occupied-background = ${colors.surface}
label-occupied-foreground = ${colors.fg}
label-occupied-padding = 3

label-empty = %name%
label-empty-background = ${colors.surface}
label-empty-foreground = ${colors.muted}
label-empty-padding = 3

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.bg-solid}
label-urgent-padding = 3

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
format-background = ${colors.surface}
format-foreground = ${colors.fg}
format-padding = 1
label = "’Æ╝ %percentage:2%%"

[module/memory]
type = internal/memory
interval = 2
format = <label>
format-background = ${colors.surface}
format-foreground = ${colors.fg}
format-padding = 1
label = "’ŗø %percentage_used:2%%"

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 98
poll-interval = 5

format-charging = <animation-charging><label-charging>
format-charging-background = ${colors.surface}
format-charging-foreground = ${colors.fg}
format-charging-padding = 1
label-charging = "%percentage:3%%"

format-discharging = <ramp-capacity><label-discharging>
format-discharging-background = ${colors.surface}
format-discharging-foreground = ${colors.fg}
format-discharging-padding = 1
label-discharging = "%percentage:3%%"

format-full = <label-full>
format-full-background = ${colors.surface}
format-full-foreground = ${colors.fg}
format-full-padding = 1
label-full = "¾░ü╣%percentage:3%%"

ramp-capacity-0 = "¾░éÄ"
ramp-capacity-1 = "¾░ü║"
ramp-capacity-2 = "¾░ü╝"
ramp-capacity-3 = "¾░üŠ"
ramp-capacity-4 = "¾░éĆ"
ramp-capacity-5 = "¾░ü╣"

animation-charging-0 = "¾░ó£"
animation-charging-1 = "¾░éå"
animation-charging-2 = "¾░éć"
animation-charging-3 = "¾░éł"
animation-charging-4 = "¾░óØ"
animation-charging-framerate = 750

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true

format-volume = <label-volume>
format-volume-background = ${colors.surface}
format-volume-foreground = ${colors.fg}
format-volume-padding = 1

label-volume = "¾░ĢŠ%percentage:3%%"

format-muted = <label-muted>
format-muted-background = ${colors.surface}
format-muted-foreground = ${colors.muted}
format-muted-padding = 1
label-muted = "¾░¢ü  0%"

[module/bluetooth]
type = custom/script
exec = /home/rav/.local/bin/bluetooth-menu --status
interval = 5
click-left = /home/rav/.local/bin/bluetooth-menu --menu
click-right = /home/rav/.local/bin/bluetooth-menu --toggle-power

format = <label>
format-background = ${colors.surface}
format-foreground = ${colors.fg}
format-padding = 1

[module/date]
type = custom/script
exec = /home/rav/.local/bin/polybar-date
interval = 1

format = <label>
format-background = ${colors.surface}
format-foreground = ${colors.fg}
format-padding = 0

[module/systray]
type = internal/tray
format-margin = 0pt
tray-spacing = 0pt

[settings]
screenchange-reload = true
pseudo-transparency = false
