[colors]
bg = #e61a1b26
bg-solid = #1a1b26
surface = #e624283b
surface-alt = #e62f3549
fg = #a9b1d6
muted = #565f89
border = #414868
blue = #7aa2f7
cyan = #7dcfff
green = #9ece6a
yellow = #e0af68
red = #f7768e
magenta = #bb9af7

[bar/main]
width = 98.5%
height = 40
offset-x = 0.75%
offset-y = 12
radius = 8
fixed-center = true

background = ${colors.bg}
foreground = ${colors.fg}

line-size = 0
border-size = 1
border-color = ${colors.border}

padding-left = 1
padding-right = 1
module-margin = 1

separator = "·"

font-0 = JetBrainsMono Nerd Font:size=12;2
font-1 = JetBrainsMono Nerd Font:size=16;3

modules-left = logo xwindow
modules-center = bspwm
modules-right = cpu memory battery pulseaudio date systray

cursor-click = pointer
cursor-scroll = ns-resize

wm-restack = bspwm
enable-ipc = true

[module/logo]
type = custom/text
content = "'->"
content-background = ${colors.blue}
content-foreground = ${colors.bg-solid}
content-padding = 1

[module/xwindow]
type = internal/xwindow
format = <label>
format-background = ${colors.surface}
format-foreground = ${colors.fg}
format-padding = 1
label = %title:0:48:...%

[module/bspwm]
type = internal/bspwm
pin-workspaces = true
enable-click = true
enable-scroll = true
reverse-scroll = false

format = <label-state>

label-focused = %name%
label-focused-background = ${colors.blue}
label-focused-foreground = ${colors.bg-solid}
label-focused-padding = 3

label-occupied = %name%
label-occupied-background = ${colors.surface}
label-occupied-foreground = ${colors.fg}
label-occupied-padding = 3

label-empty = %name%
label-empty-background = ${colors.surface}
label-empty-foreground = ${colors.muted}
label-empty-padding = 3

label-urgent = %name%
label-urgent-background = ${colors.red}
label-urgent-foreground = ${colors.bg-solid}
label-urgent-padding = 3

[module/cpu]
type = internal/cpu
interval = 2
format = <label>
format-background = ${colors.surface}
format-foreground = ${colors.fg}
format-padding = 2
label = " %percentage:2%%"

[module/memory]
type = internal/memory
interval = 2
format = <label>
format-background = ${colors.surface}
format-foreground = ${colors.fg}
format-padding = 2
label = "󰍛 %percentage_used:2%%"

[module/battery]
type = internal/battery
battery = BAT0
adapter = ADP1
full-at = 98
poll-interval = 5

format-charging = <animation-charging><label-charging>
format-charging-background = ${colors.surface}
format-charging-foreground = ${colors.fg}
format-charging-padding = 2
label-charging = " %percentage%%"

format-discharging = <ramp-capacity><label-discharging>
format-discharging-background = ${colors.surface}
format-discharging-foreground = ${colors.fg}
format-discharging-padding = 2
label-discharging = " %percentage%%"

format-full = <label-full>
format-full-background = ${colors.surface}
format-full-foreground = ${colors.fg}
format-full-padding = 2
label-full = "󰁹 %percentage%%"

ramp-capacity-0 = "󰂎"
ramp-capacity-1 = "󰁺"
ramp-capacity-2 = "󰁼"
ramp-capacity-3 = "󰁾"
ramp-capacity-4 = "󰂀"
ramp-capacity-5 = "󰁹"

animation-charging-0 = "󰢜"
animation-charging-1 = "󰂆"
animation-charging-2 = "󰂇"
animation-charging-3 = "󰂈"
animation-charging-4 = "󰢝"
animation-charging-framerate = 750

[module/pulseaudio]
type = internal/pulseaudio
use-ui-max = true

format-volume = <label-volume>
format-volume-background = ${colors.surface}
format-volume-foreground = ${colors.fg}
format-volume-padding = 1

label-volume = "󰕾 %percentage%%"

format-muted = <label-muted>
format-muted-background = ${colors.surface}
format-muted-foreground = ${colors.muted}
format-muted-padding = 1
label-muted = "󰖁 muted"

[module/date]
type = internal/date
interval = 1

date = %a %d %b
time = %H:%M

format = <label>
format-background = ${colors.surface}
format-foreground = ${colors.fg}
format-padding = 1
label = "󰃰 %date% 󰥔 %time%"

[module/systray]
type = internal/tray
format-margin = 6pt
tray-spacing = 10pt

[settings]
screenchange-reload = true
pseudo-transparency = false
