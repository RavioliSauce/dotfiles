# General Settings
backend = "glx";
vsync = true;

# Transparency
active-opacity = 1.0;
inactive-opacity = 1.0;
frame-opacity = 1.0;

# This is crucial for Alacritty + glx
use-damage = false;

# Corner rounding (optional, looks nice with bspwm)
corner-radius = 12;
rounded-corners-exclude = [
  "class_g ?= 'Polybar'"
];

# Keep normal windows restrained, but let transient UI move more noticeably.
rules = (
  {
    match = "window_type = 'dialog' || window_type = 'utility' || window_type = 'menu' || window_type = 'dropdown_menu' || window_type = 'popup_menu' || window_type = 'tooltip' || window_type = 'notification' || class_g = 'Rofi'";
    animations = (
      {
        triggers = [ "open", "show" ];
        move-progress = {
          curve = "cubic-bezier(0.12, 1.0, 0.22, 1.0)";
          duration = 0.34;
          start = 0;
          end = 1;
        };
        fade-progress = {
          curve = "cubic-bezier(0.24, 0.08, 0.12, 1.0)";
          duration = 0.18;
          start = 0;
          end = 1;
        };
        opacity = "0.35 + 0.65 * fade-progress";
        shadow-opacity = "0.20 + 0.80 * fade-progress";
        offset-y = "-120 * (1 - move-progress)";
        shadow-offset-y = "-120 * (1 - move-progress)";
        scale-y = "0.78 + 0.22 * move-progress";
        shadow-scale-y = "0.78 + 0.22 * move-progress";
      },
      {
        triggers = [ "close", "hide" ];
        move-progress = {
          curve = "cubic-bezier(0.4, 0.0, 0.2, 1.0)";
          duration = 0.18;
          start = 1;
          end = 0;
        };
        fade-progress = {
          curve = "cubic-bezier(0.4, 0.0, 0.2, 1.0)";
          duration = 0.12;
          start = 1;
          end = 0;
        };
        opacity = "fade-progress";
        shadow-opacity = "fade-progress";
        offset-y = "-36 * (1 - move-progress)";
        shadow-offset-y = "-36 * (1 - move-progress)";
        scale-y = "0.88 + 0.12 * move-progress";
        shadow-scale-y = "0.88 + 0.12 * move-progress";
      }
    );
  },
  {
    match = "window_type = 'normal'";
    animations = (
      {
        triggers = [ "open", "show" ];
        progress = {
          curve = "cubic-bezier(0.2, 0.9, 0.25, 1.0)";
          duration = 0.15;
          start = 0;
          end = 1;
        };
        opacity = "progress";
        shadow-opacity = "progress";
        offset-y = "-12 * (1 - progress)";
        shadow-offset-y = "-12 * (1 - progress)";
        scale-y = "0.96 + 0.04 * progress";
        shadow-scale-y = "0.96 + 0.04 * progress";
      },
      {
        triggers = [ "close", "hide" ];
        progress = {
          curve = "cubic-bezier(0.4, 0.0, 0.2, 1.0)";
          duration = 0.10;
          start = 1;
          end = 0;
        };
        opacity = "progress";
        shadow-opacity = "progress";
        offset-y = "-8 * (1 - progress)";
        shadow-offset-y = "-8 * (1 - progress)";
        scale-y = "0.97 + 0.03 * progress";
        shadow-scale-y = "0.97 + 0.03 * progress";
      }
    );
  }
);
